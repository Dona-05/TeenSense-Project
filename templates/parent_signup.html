<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Signup - TeenSense</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
    }
</style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h1 class="text-2xl font-bold text-center text-pink-600 mb-6">
        Parent Sign Up
    </h1>

    <!-- IMPORTANT -->
    <form method="POST" class="space-y-4">

        <!-- FULL NAME -->
        <input
            type="text"
            name="full_name"
            placeholder="Full Name"
            required
            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-400">

        <!-- CHILD NAME -->
        <input
            type="text"
            name="child_name"
            placeholder="Child Name"
            required
            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-400">

        <!-- CONTACT -->
        <input
            type="text"
            name="contact"
            placeholder="Contact Number"
            required
            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-400">

        <!-- EMAIL -->
        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-400">

        <!-- PASSWORD -->
        <input
            type="password"
            name="password"
            placeholder="Password"
            required
            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-400">

        <!-- SUBMIT -->
        <button
            type="submit"
            class="w-full bg-pink-600 text-white py-2 rounded-lg hover:bg-pink-700 transition">

            Create Account
        </button>

    </form>

</div>

</body>
</html>
