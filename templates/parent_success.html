<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Account Created</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gradient-to-br from-pink-50 to-blue-50 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-8 text-center max-w-md w-full">

    <h1 class="text-2xl font-bold text-blue-600 mb-4">
        Parent Account Created Successfully 🎉
    </h1>

    <p class="text-gray-600 mb-2">
        Your parent account has been created successfully.
    </p>

    <p class="text-gray-700 mb-6">
        Your Parent ID:
        <span class="font-semibold text-pink-600 text-lg">
            {{ parent_id }}
        </span>
    </p>

    <!-- GO HOME BUTTON -->
    <a href="/"
       class="px-6 py-2 bg-pink-600 text-white rounded-lg hover:bg-pink-700 transition duration-300">
        Go Home
    </a>

</div>

</body>
</html>
