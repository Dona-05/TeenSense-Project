<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeenSense - Reminders</title>

<style>
:root {
    --primary-pink: #d81b60;
    --primary-blue: #2563eb;
    --gradient-main: linear-gradient(135deg, #ec4899 0%, #3b82f6 100%);
    --bg-light: #f9fafb;
}

* {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background-color: var(--bg-light);
    }

    /* NAVBAR */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 80px;
        background: white;
    }

    .brand-logo {
        font-size: 24px;
        font-weight: bold;
        color: var(--primary-pink);
    }

    .nav-links {
        display: flex;
        gap: 30px;
    }

    .nav-links a {
        text-decoration: none;
        color: #666;
        font-weight: 500;
    }

    .nav-links a.active-link {
        color: var(--primary-pink);
    }

    .right-section {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .user-profile {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #f0f7ff;
        padding: 6px 15px;
        border-radius: 30px;
    }

    .logout-btn {
        background: #ef4444;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
    }

    .logout-btn:hover {
        background: #dc2626;
    }

.container {
    padding: 40px 80px;
    text-align: center;
}

.calendar-header {
    display: flex;
    justify-content: space-between;
    max-width: 800px;
    margin: 0 auto 20px;
}

.calendar-header button {
    background: var(--gradient-main);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
}

.calendar-header button:hover {
    opacity: 0.85;
}

.calendar-header h2 { color: var(--primary-pink); }

.day-names {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    max-width: 800px;
    margin: 0 auto 10px;
    font-weight: bold;
    color: var(--primary-blue);
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    gap: 10px;
    max-width: 800px;
    margin: 0 auto;
}

.day {
    background: white;
    height: 90px;
    border-radius: 12px;
    padding: 8px;
    cursor: pointer;
}

.today {
    background: var(--gradient-main);
    color: rgb(0, 0, 0);
    border: 2px solid var(--primary-pink);
}

.event {
    background: #fce7f3;
    margin-top: 5px;
    padding: 4px;
    border-radius: 6px;
    font-size: 10px;
    text-align: left;
    line-height: 1.2;
}

.popup {
    position: fixed;
    right: 50px;
    top: 50%;
    transform: translateY(-50%);
    background: white;
    padding: 20px;
    display: none;
    width: 280px;
}

.popup input, .popup textarea {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
}

.save-btn {
    background: var(--gradient-main);
    color: white;
    margin-top: 10px;
    padding: 10px;
    width: 100%;
}

.cancel-btn {
    margin-top: 5px;
    width: 100%;
}
</style>
</head>

<body>

<nav>

    <div class="brand-logo">★ TeenSense</div>

    <div class="nav-links">
        <a href="/child/dashboard">Home</a>
        <a href="/journal">Journaling</a>
        <a href="/teen/flashcards">Flashcards</a>
        <a href="/child/reminders" class="active-link">Reminders</a>
    </div>

    <div class="right-section">

        <div class="user-profile">
            <div style="
                background: var(--primary-blue);
                color: white;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;">
                ★
            </div>
            <strong>{{ child_name }}</strong>
        </div>

        <a href="/logout">
            <button class="logout-btn">Logout</button>
        </a>

    </div>

</nav>

<div class="container">

<h1>Your Reminders</h1>

<div class="calendar-header">
<h2 id="monthTitle"></h2>
<div>
<button onclick="prevMonth()">←</button>
<button onclick="nextMonth()">→</button>
</div>
</div>

<div class="day-names">
<div>Sun</div><div>Mon</div><div>Tue</div>
<div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
</div>

<div class="calendar" id="calendar"></div>

</div>

<!-- POPUP FORM -->
<div class="popup" id="popup">

<form method="POST" action="/add_reminder">

<h3>Add Reminder</h3>

<input type="text" name="title" id="title" placeholder="Event title" required>
<input type="date" name="date" id="date" required>

<input type="time" name="start" id="start">
<input type="time" name="end" id="end">

<button type="submit" class="save-btn">Save</button>
<button type="button" onclick="closePopup()" class="cancel-btn">Cancel</button>

</form>

</div>

<script>
let currentDate = new Date();
let selectedDay = null;

const calendar = document.getElementById("calendar");

// ✅ SAFE BACKEND DATA
const reminders = JSON.parse('{{ (reminders or []) | tojson | safe }}');

function formatTime(time){
    if(!time) return "";
    let [hour, min] = time.split(":");
    hour = parseInt(hour);

    let ampm = hour >= 12 ? "PM" : "AM";
    hour = hour % 12 || 12;

    return `${hour}:${min} ${ampm}`;
}

function renderCalendar() {
    calendar.innerHTML = "";

    let year = currentDate.getFullYear();
    let month = currentDate.getMonth();

    const monthNames = ["January","February","March","April","May","June",
    "July","August","September","October","November","December"];

    document.getElementById("monthTitle").innerText =
        monthNames[month] + " " + year;

    let firstDay = new Date(year, month, 1).getDay();
    let totalDays = new Date(year, month+1, 0).getDate();

    let today = new Date();

    for (let i=0;i<firstDay;i++){
        calendar.appendChild(document.createElement("div"));
    }

    for (let i=1;i<=totalDays;i++){

        let div = document.createElement("div");
        div.className="day";
        div.innerHTML="<b>"+i+"</b>";

        // ✅ TODAY HIGHLIGHT
        if(i===today.getDate() && month===today.getMonth() && year===today.getFullYear()){
            div.classList.add("today");
        }

        let fullDate = year + "-" + String(month+1).padStart(2,'0') + "-" + String(i).padStart(2,'0');

        // ✅ SHOW EVENTS WITH TIME
        if (Array.isArray(reminders)) {
            reminders.forEach(rem => {
                if(rem.date === fullDate){

                    let event = document.createElement("div");
                    event.className="event";

                    let start = formatTime(rem.start);
                    let end = formatTime(rem.end);

                    if(start && end){
                        event.innerText = `${rem.title} (${start} - ${end})`;
                    } else if(start){
                        event.innerText = `${rem.title} (${start})`;
                    } else {
                        event.innerText = rem.title;
                }

                    div.appendChild(event);
                }
            });
        }

        div.onclick = () => openPopup(i, div, fullDate);

        calendar.appendChild(div);
    }
}

function prevMonth(){
    currentDate.setMonth(currentDate.getMonth()-1);
    renderCalendar();
}

function nextMonth(){
    currentDate.setMonth(currentDate.getMonth()+1);
    renderCalendar();
}

function openPopup(day, element, fullDate){
    selectedDay = element;
    document.getElementById("popup").style.display="block";
    document.getElementById("date").value = fullDate;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}
console.log("Reminders:", reminders);

renderCalendar();
</script>

</body>
</html>
