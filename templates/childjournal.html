<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeenSense - Journaling</title>

<style>
:root {
    --primary-pink:#d81b60;
    --primary-blue:#2563eb;
    --gradient-btn:linear-gradient(90deg,#c026d3 0%,#3b82f6 100%);
    --text-muted:#6b7280;
}

* {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background-color: var(--bg-light);
    }

    /* NAVBAR */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 80px;
        background: white;
    }

    .brand-logo {
        font-size: 24px;
        font-weight: bold;
        color: var(--primary-pink);
    }

    .nav-links {
        display: flex;
        gap: 30px;
    }

    .nav-links a {
        text-decoration: none;
        color: #666;
        font-weight: 500;
    }

    .nav-links a.active-link {
        color: var(--primary-pink);
    }

    .right-section {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .user-profile {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #f0f7ff;
        padding: 6px 15px;
        border-radius: 30px;
    }

    .logout-btn {
        background: #ef4444;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
    }

    .logout-btn:hover {
        background: #dc2626;
    }

/* MAIN */
.container{
    max-width:900px;
    margin:40px auto;
    padding:0 20px;
}

.subtitle{ color:var(--text-muted); }

/* MESSAGE */
.message{
    background:#ecfdf3;
    color:#166534;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
}

/* TABS */
.tab-container{
    display:flex;
    background:#e5e7eb;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:30px;
}

.tab{
    flex:1;
    padding:14px;
    text-align:center;
    cursor:pointer;
}

.tab.active{
    background:var(--gradient-btn);
    color:white;
}

/* JOURNAL */
textarea{
    width:100%;
    height:250px;
    background:#f3f4f6;
    border:none;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.btn{
    padding:14px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.btn-save{
    background:var(--gradient-btn);
    color:white;
}

.btn-clear{
    background:#d1d5db;
}

/* MOOD GRID */
.hidden{display:none;}

.mood-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    text-align:center;
}

.mood-grid div:nth-child(4){
    grid-column: 1 / 2;
    justify-self: end;
}

.mood-grid div:nth-child(5){
    grid-column: 3 / 4;
    justify-self: start;
}

.mood-item{ cursor:pointer; }

.mood-circle{
    width:90px;
    height:90px;
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    color:white;
    transition:0.2s;
}

.mood-circle:hover{ transform:scale(1.1); }

.mood-selected{
    transform:scale(1.2);
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

/* DISABLED */
.disabled{
    opacity:0.5;
    pointer-events:none;
}

/* FEEDBACK */
.success-msg{
    margin-top:15px;
    font-weight:500;
    color:green;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>

    <div class="brand-logo">★ TeenSense</div>

    <div class="nav-links">
        <a href="/child/dashboard">Home</a>
        <a href="/journal" class="active-link">Journaling</a>
        <a href="/teen/flashcards">Flashcards</a>
        <a href="/child/reminders">Reminders</a>
    </div>

    <div class="right-section">

        <div class="user-profile">
            <div style="
                background: var(--primary-blue);
                color: white;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;">
                ★
            </div>
            <strong>{{ child_name }}</strong>
        </div>

        <a href="/logout">
            <button class="logout-btn">Logout</button>
        </a>

    </div>

</nav>

<div class="container">

<h1>Journaling</h1>


{% if message %}
<div class="message">{{ message }}</div>
{% endif %}

<div class="tab-container">
    <div id="tab-entry" class="tab active" onclick="switchView('entry')">Journal Entry</div>
    <div id="tab-mood" class="tab" onclick="switchView('mood')">Quick Mood Check</div>
</div>

<!-- JOURNAL -->
<div id="entry-section">
<form method="POST" id="journalForm">

<textarea name="journal_text" placeholder="Write about your day..."></textarea>

<button type="submit" class="btn btn-save">Save Entry</button>
<button type="reset" class="btn btn-clear">Clear</button>

</form>
</div>

<!-- MOOD -->
<div id="mood-section" class="hidden">
<h3>Quick Mood Check</h3>

<div class="mood-grid" id="moodGrid">

<div class="mood-item" onclick="selectMood(this,'Happy')">
<div class="mood-circle" style="background:#22c55e;">😊</div><p>Happy</p>
</div>

<div class="mood-item" onclick="selectMood(this,'Sad')">
<div class="mood-circle" style="background:#f97316;">☹️</div><p>Sad</p>
</div>

<div class="mood-item" onclick="selectMood(this,'Anxious')">
<div class="mood-circle" style="background:#ca8a04;">🤯</div><p>Anxious</p>
</div>

<div class="mood-item" onclick="selectMood(this,'Neutral')">
<div class="mood-circle" style="background:#6b7280;">😐</div><p>Neutral</p>
</div>

<div class="mood-item" onclick="selectMood(this,'Angry')">
<div class="mood-circle" style="background:#ef4444;">😡</div><p>Angry</p>
</div>

</div>

<div id="feedback" class="success-msg"></div>
</div>

</div>

<script>
// ✅ FROM BACKEND
const submittedToday = "{{ submitted_today | default(false) }}" === "True";

// -------------------------------
function switchView(type){

    if(submittedToday){
        document.getElementById("feedback").innerText =
            "⚠️ You already submitted today!";
        return;
    }

    document.getElementById("entry-section").classList.toggle("hidden", type!=="entry");
    document.getElementById("mood-section").classList.toggle("hidden", type!=="mood");

    document.getElementById("tab-entry").classList.toggle("active", type==="entry");
    document.getElementById("tab-mood").classList.toggle("active", type==="mood");
}

// -------------------------------
document.getElementById("journalForm").onsubmit = function(){
    if(submittedToday){
        alert("Already submitted today!");
        return false;
    }
};

// -------------------------------
function selectMood(element, emotion){

    if(submittedToday){
        document.getElementById("feedback").innerText =
            "⚠️ Already submitted today!";
        return;
    }

    document.querySelectorAll(".mood-circle").forEach(el=>{
        el.classList.remove("mood-selected");
    });

    element.querySelector(".mood-circle").classList.add("mood-selected");

    fetch("/save_mood", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ emotion:emotion })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.status==="success"){
            document.getElementById("feedback").innerText =
                "Mood saved: "+emotion;

            document.getElementById("moodGrid").classList.add("disabled");
            document.getElementById("journalForm").classList.add("disabled");
        }else{
            document.getElementById("feedback").innerText =
                "⚠️ Already submitted today!";
        }
    });
}

// -------------------------------
// 🔒 AUTO LOCK IF ALREADY SUBMITTED
// -------------------------------
if(submittedToday){
    document.getElementById("moodGrid").classList.add("disabled");
    document.getElementById("journalForm").classList.add("disabled");

    document.getElementById("feedback").innerText =
        "✅ Today's entry already submitted";
}
</script>

</body>
</html>
